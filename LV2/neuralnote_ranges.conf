# neuralnote_ranges.conf — range configuration for the LV2 bundle
#
# Global parameters (gate_floor, amp_floor, threshold, frame_threshold, mode)
# are NOT set here — their defaults come from the LV2 port definitions in
# plugin.ttl and can be overridden by the host at runtime.
#
# Note ranges
# ───────────
# Each [range] section defines an independent inference context.
# Fields:
#   name            — label used in log output
#   midi_low        — lowest MIDI note number in this range  (inclusive)
#   midi_high       — highest MIDI note number in this range (inclusive)
#   window          — audio capture window in ms (35–2000). Longer windows
#                     improve accuracy for low notes; shorter windows reduce
#                     latency for high notes.
#   min_note_length — minimum note length in CNN frames (1 frame ≈ 11.6 ms).
#                     Shorter notes than this are filtered out by BasicPitch.
#   hold_cycles     — number of inference cycles to hold a note-OFF after a
#                     note disappears. Each cycle ≈ window/2 ms. Use 2–4 for
#                     legato bass lines; 0 for fast melodic lines.
#   swift_hold_cycles — hold cycles for SwiftF0 mode (faster inference cycles
#                     need fewer holds to achieve similar hold time).
#
# Ranges should be non-overlapping. Notes outside all ranges are discarded.
# ──────────────────────────────────────────────────────────────────────────

# ── Low strings: E2–B2 (standard guitar: open E2, A2, D3 area) ──────────────
[range]
name            = E2-B2
midi_low        = 40   # E2
midi_high       = 47   # B2
window          = 100
min_note_length = 4
hold_cycles     = 4
swift_hold_cycles = 3

# ── Mid-low strings: C3–B3 ───────────────────────────────────────────────────
[range]
name            = C3-B3
midi_low        = 48   # C3
midi_high       = 59   # B3
window          = 100
min_note_length = 4
hold_cycles     = 16
swift_hold_cycles = 2

# ── Mid strings: C4–B4 (middle octave) ───────────────────────────────────────
[range]
name            = C4-B4
midi_low        = 60   # C4
midi_high       = 71   # B4
window          = 80
min_note_length = 3
hold_cycles     = 16
swift_hold_cycles = 2

# ── High strings: C5–G#5 ─────────────────────────────────────────────────────
[range]
name            = C5-G#5
midi_low        = 72   # C5
midi_high       = 80   # GS5
window          = 60
min_note_length = 2
hold_cycles     = 16
swift_hold_cycles = 2

# ── Very high strings: A5 and above ──────────────────────────────────────────
[range]
name            = A5+
midi_low        = 81   # A5
midi_high       = 127  # G9
window          = 80
min_note_length = 3
hold_cycles     = 16
swift_hold_cycles = 2
