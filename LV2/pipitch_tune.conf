# neuralnote_tune.conf — parameter configuration for neuralnote_tune
#
# Global settings (apply to all ranges)
# ──────────────────────────────────────
gate_floor       = 0.003
amp_floor        = 0.65
threshold        = 0.6
frame_threshold  = 0.5
mode             = mono
onset_blank_ms   = 25
swift_threshold  = 0.5    # SwiftF0 per-frame confidence floor (used when mode = swiftmono)

# Note ranges
# ───────────
# Each [range] section defines an independent inference context.
# Fields:
#   name            — label shown in console output
#   midi_low        — lowest MIDI note number in this range  (inclusive)
#   midi_high       — highest MIDI note number in this range (inclusive)
#   window          — audio capture window in ms (35–2000)
#   min_note_length — minimum note length in CNN frames (1 frame ≈ 11.6 ms)
#   hold_cycles     — inference cycles to hold a note-OFF; each ≈ window/2 ms
#   swift_hold_cycles — hold cycles for SwiftF0 (faster cycles need fewer holds)
# ──────────────────────────────────────────────────────────────────────────

[range]
name            = E2-B2
midi_low        = 40   # E2
midi_high       = 47   # B2
window          = 100
min_note_length = 4
hold_cycles     = 4
swift_hold_cycles = 3

[range]
name            = C3-B3
midi_low        = 48   # C3
midi_high       = 59   # B3
window          = 100
min_note_length = 4
hold_cycles     = 16
swift_hold_cycles = 2

[range]
name            = C4-B4
midi_low        = 60   # C4
midi_high       = 71   # B4
window          = 80
min_note_length = 3
hold_cycles     = 16
swift_hold_cycles = 3

[range]
name            = C5-G#5
midi_low        = 72   # C5
midi_high       = 80   # GS5
window          = 60
min_note_length = 2
hold_cycles     = 16
swift_hold_cycles = 6

[range]
name            = A5+
midi_low        = 81   # A5
midi_high       = 127  # G9
window          = 80
min_note_length = 3
hold_cycles     = 16
swift_hold_cycles = 6
